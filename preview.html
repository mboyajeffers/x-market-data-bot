<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Post Preview — @Mboya_Jeffers</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── switcher bar ── */
  .switcher {
    width: 100%;
    background: #000;
    border-bottom: 1px solid #2f3336;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .switcher-label { color: #71767b; font-size: 13px; margin-right: 4px; flex-shrink: 0; }
  .v-btn {
    background: transparent;
    color: #71767b;
    border: 1px solid #2f3336;
    border-radius: 50px;
    padding: 4px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .v-btn:hover { border-color: #71767b; color: #e7e9ea; }
  .v-btn.active { background: #e7e9ea; color: #000; border-color: #e7e9ea; font-weight: 700; }

  /* ── feed column ── */
  .feed {
    width: 100%;
    max-width: 600px;
    border-left: 1px solid #2f3336;
    border-right: 1px solid #2f3336;
    min-height: 100vh;
  }

  /* ── fake preceding post (context) ── */
  .context-post {
    padding: 12px 16px;
    border-bottom: 1px solid #2f3336;
    display: flex;
    gap: 12px;
    opacity: 0.45;
    pointer-events: none;
  }
  .ctx-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #2f3336; flex-shrink: 0;
  }
  .ctx-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
  .ctx-line { height: 10px; border-radius: 4px; background: #2f3336; }
  .ctx-line.short { width: 40%; }
  .ctx-line.med { width: 65%; }
  .ctx-line.long { width: 88%; }

  /* ── main post ── */
  .post {
    padding: 12px 16px;
    border-bottom: 1px solid #2f3336;
    display: flex;
    gap: 12px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .post:hover { background: rgba(255,255,255,0.03); }

  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    overflow: hidden; flex-shrink: 0;
    background: #2f3336;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .post-body { flex: 1; min-width: 0; }

  .post-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .post-header-left {
    display: flex;
    align-items: baseline;
    gap: 4px;
    flex-wrap: wrap;
    min-width: 0;
  }
  .display-name {
    color: #e7e9ea;
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
  }
  .handle { color: #71767b; font-size: 15px; white-space: nowrap; }
  .dot { color: #71767b; font-size: 15px; }
  .timestamp { color: #71767b; font-size: 15px; white-space: nowrap; }

  .more-btn {
    color: #71767b; font-size: 18px; cursor: pointer;
    padding: 2px 6px; border-radius: 50%; flex-shrink: 0;
    transition: color 0.1s, background 0.1s;
    line-height: 1;
  }
  .more-btn:hover { color: #1d9bf0; background: rgba(29,155,240,0.1); }

  .post-text {
    color: #e7e9ea;
    font-size: 15px;
    line-height: 1.55;
    margin-bottom: 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .post-text .hashtag { color: #1d9bf0; }

  .post-image {
    border-radius: 16px;
    border: 1px solid #2f3336;
    width: 100%;
    display: block;
    margin-bottom: 12px;
  }

  /* ── action row ── */
  .actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 440px;
    margin-bottom: 4px;
  }

  .action {
    display: flex; align-items: center; gap: 5px;
    color: #71767b; font-size: 13px;
    cursor: pointer;
    padding: 6px;
    border-radius: 50px;
    transition: all 0.1s;
    user-select: none;
  }
  .action svg { width: 18px; height: 18px; flex-shrink: 0; }
  .action:hover.reply   { color: #1d9bf0; background: rgba(29,155,240,0.1); }
  .action:hover.repost  { color: #00ba7c; background: rgba(0,186,124,0.1); }
  .action:hover.like    { color: #f91880; background: rgba(249,24,128,0.1); }
  .action:hover.views   { color: #1d9bf0; background: rgba(29,155,240,0.1); }
  .action:hover.bookmark{ color: #1d9bf0; background: rgba(29,155,240,0.1); }
  .action:hover.share   { color: #1d9bf0; background: rgba(29,155,240,0.1); }

  /* ── following post (context) ── */
  .following-post {
    padding: 12px 16px;
    border-bottom: 1px solid #2f3336;
    display: flex;
    gap: 12px;
    opacity: 0.45;
    pointer-events: none;
  }
  .fol-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #1d9bf020; border: 1px solid #2f3336;
    flex-shrink: 0;
  }
</style>
</head>

<script>
const DATE = "2026-06-18";
const CARDS = "/Users/mboyajeffers/Claude_Projects/REVENUE/X/cards/";

const DATA = {
  finance:    { img: "finance_x_card",    cap: `Weekly market data — ${DATE}\n\nBest sector:  Industrials  +5.9%\nWorst sector: Energy  -6.2%\nSPY 5d: +2.1%\nVIX: 18.4\n\nAutomated via Yahoo Finance + FRED.\n\n#DataEngineering #Finance #Markets` },
  brokerage:  { img: "brokerage_x_card",  cap: `Brokerage sector snapshot — ${DATE}\n\nSPY: $740.96  (+2.1% 5d)\nVIX: 18.4  (Elevated)\nGS:   +9.8% 5d\nSCHW: +5.9% 5d\n\nOptions flow in card. Automated via Yahoo Finance.\n\n#Finance #DataEngineering #Markets` },
  crypto:     { img: "crypto_x_card",     cap: `Crypto snapshot — ${DATE}\n\nFear & Greed: 15 (Extreme Fear)\nTop 7d: HYPE +27.6%\nBTC 30d: -16.8%\nETH 30d: -18.2%\nBTC dominance: 56.1%  |  Mkt cap: $2.28T\n\nAutomated via CoinGecko API.\n\n#Crypto #Bitcoin #DataEngineering` },
  compliance: { img: "compliance_x_card", cap: `SEC enforcement tracker — ${DATE}\n\nInvestigation 8-Ks (30d): 6\nSubpoena/DOJ 8-Ks (30d):  404\nEnforcement 8-Ks (7d):    288\nS-1 registrations (30d):  231\n\nEnforcement activity: ELEVATED\n\nData: SEC EDGAR public filings.\n\n#Compliance #SEC #DataEngineering` },
  oilgas:     { img: "oilgas_x_card",     cap: `US energy snapshot — ${DATE}\n\nWTI Futures: $74.02  (-15.6% 5d)\nHenry Hub:   $3.120/MMBtu  (+1.2% 5d)\nXLE: -6.2%\nSLB: -9.3%\nOil/Gas ratio (BTU): 4.0x\n\nAutomated via FRED + Yahoo Finance.\n\n#Energy #OilAndGas #DataEngineering` },
  betting:    { img: "betting_x_card",    cap: `Sports betting sector — ${DATE}\n\nDraftKings: -8.6% 5d\nPenn Ent.:  -1.0% 5d\nFlutter:    -10.0% 5d\nBETZ ETF:  -1.8% 5d\nSPY: +2.1%\n\nActive: NBA Finals · MLB · Stanley Cup\n\n#SportsBetting #DataEngineering #Finance` },
  gaming:     { img: "gaming_x_card",     cap: `Video gaming sector — ${DATE}\n\nRoblox:    +15.7% 5d\nTake-Two:  +8.3% 5d\nEA:        -0.1% 5d\nESPO ETF:  +0.5% 5d\nSPY: +2.1%\n\nAutomated via Yahoo Finance.\n\n#Gaming #VideoGames #DataEngineering` },
  ecommerce:  { img: "ecommerce_x_card",  cap: `E-commerce sector — ${DATE}\n\nAmazon:   -0.2% 5d\nShopify:  -0.1% 5d\nEtsy:     +6.0% 5d\nSPY: +2.1%\n\nConsumer sentiment chart in card (FRED UMCSENT).\n\n#Ecommerce #Retail #DataEngineering` },
  media:      { img: "media_x_card",      cap: `Media & streaming sector — ${DATE}\n\nNetflix:  -6.2% 5d\nDisney:   +2.3% 5d\nSpotify:  -9.4% 5d\nRoku:     +17.4% 5d\nSPY: +2.1%\n\nAutomated via Yahoo Finance.\n\n#Streaming #Media #DataEngineering` },
  solar:      { img: "solar_x_card",      cap: `Solar & clean energy — ${DATE}\n\nFirst Solar:  +2.2% 5d\nEnphase:      -5.5% 5d\nTAN ETF:      -1.2% 5d\nSPY: +2.1%\n\nWTI crude context in card (FRED + Yahoo Finance).\n\n#Solar #CleanEnergy #DataEngineering` },
  weather:    { img: "weather_x_card",    cap: `US weather snapshot — ${DATE}\n\nNew York: 69°F\nMiami: 81°F\nChicago: 64°F\n\n8 cities in card. Automated via Open-Meteo.\n\n#Weather #Climate #DataEngineering` }
};

function setV(v, btn) {
  document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const d = DATA[v];

  // caption with blue hashtags
  const raw = d.cap.replace(/[&]/g, '&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>');
  document.getElementById('caption').innerHTML = raw.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>');

  document.getElementById('card-img').src = 'file://' + CARDS + d.img + '_' + DATE + '.png';
}

setV('finance', document.querySelector('.v-btn.active'));
</script>
